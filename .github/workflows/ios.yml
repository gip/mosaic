name: ios

on:
  push:
    branches: [main]
    paths: ['ios-app/**']
  pull_request:
    paths: ['ios-app/**']

jobs:
  mosaickit:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: MosaicKit unit tests
        working-directory: ios-app/MosaicKit
        run: swift test
      - name: Build app for simulator
        working-directory: ios-app
        run: |
          xcodebuild -project Mosaic.xcodeproj -scheme Mosaic \
            -destination 'generic/platform=iOS Simulator' \
            build CODE_SIGNING_ALLOWED=NO | tail -20
