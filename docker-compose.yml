services:
  postgres:
    image: postgres:17-alpine
    container_name: mosaic-x-postgres
    environment:
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: mosaic
      POSTGRES_DB: mosaic
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mosaic -d mosaic']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
